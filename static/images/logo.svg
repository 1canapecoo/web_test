<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <!-- Background -->
  <rect width="600" height="350" fill="white"/>
  
  <!-- Arc (sunrise) -->
  <path d="M200,100 Q350,20 500,100" fill="none" stroke="#1a365d" stroke-width="8" stroke-linecap="round"/>
  <path d="M210,98 Q345,30 490,98" fill="none" stroke="url(#arcGradient)" stroke-width="6" stroke-linecap="round"/>
  <defs>
    <linearGradient id="arcGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>
  </defs>
  
  <!-- Mountain peaks -->
  <polygon points="220,220 260,140 300,220" fill="#1a365d"/>
  <polygon points="300,220 360,120 440,220" fill="#1a365d"/>
  
  <!-- Letter P (orange part) -->
  <polygon points="300,130 320,130 320,220 380,220 380,90 300,90" fill="#f97316"/>
  <!-- Letter P (dark blue part) -->
  <polygon points="300,90 300,130 370,130 370,90" fill="#1a365d"/>
  
  <!-- PEAK SUNRISE text -->
  <text x="60" y="290" font-family="'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#1a365d" letter-spacing="2">PEAK SUNRISE</text>
  
  <!-- CONSULTANTS text -->
  <text x="150" y="335" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="400" fill="#1a365d" letter-spacing="3">CONSULTANTS</text>
</svg>
