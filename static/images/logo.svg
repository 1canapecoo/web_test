<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
  <!-- Background -->
  <rect width="500" height="280" fill="white"/>
  
  <!-- Arc (sunrise) with gradient -->
  <path d="M150,70 Q280,10 420,70" fill="none" stroke="#1a365d" stroke-width="6" stroke-linecap="round"/>
  <path d="M158,68 Q275,20 412,68" fill="none" stroke="url(#arcGrad)" stroke-width="4" stroke-linecap="round"/>
  
  <defs>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="30%" stop-color="#eab308"/>
      <stop offset="70%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>
  </defs>
  
  <!-- Mountain peaks -->
  <polygon points="180,180 215,110 250,180" fill="#1a365d"/>
  <polygon points="250,180 300,80 370,180" fill="#1a365d"/>
  
  <!-- Letter P -->
  <polygon points="250,90 270,90 270,180 320,180 320,65 250,65" fill="#f97316"/>
  <polygon points="250,65 250,90 310,90 310,65" fill="#1a365d"/>
  
  <!-- PEAK SUNRISE text -->
  <text x="40" y="230" font-family="'Arial Black', sans-serif" font-size="40" font-weight="900" fill="#1a365d" letter-spacing="1">PEAK SUNRISE</text>
  
  <!-- CONSULTANTS text -->
  <text x="115" y="265" font-family="'Arial', sans-serif" font-size="22" font-weight="400" fill="#1a365d" letter-spacing="4">CONSULTANTS</text>
</svg>
